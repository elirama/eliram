<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eliram.co</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Inter', sans-serif; color: white; background-color: black; overflow: hidden; }

        #video-viewport {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background: black;
        }

        video {
            min-width: 100%; min-height: 100%; width: auto; height: auto;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            filter: brightness(0.4) contrast(1.1);
        }

        .container {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.5) 100%);
        }

        .logo { font-size: 3.5rem; font-weight: 700; letter-spacing: -2px; margin-bottom: 5px; }
        .tagline { font-size: 1rem; opacity: 0.6; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 60px; }

        #quote-container { height: 100px; max-width: 600px; padding: 0 20px; }
        #quote { font-style: italic; font-size: 1.4rem; line-height: 1.6; transition: opacity 0.8s; color: #eee; }

        .cta-button {
            margin-top: 50px; padding: 18px 50px; font-size: 0.9rem; font-weight: 700;
            color: white; border: 1.5px solid white; text-decoration: none;
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            text-transform: uppercase; letter-spacing: 2px;
        }
        .cta-button:hover { background: white; color: black; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }

        footer { position: absolute; bottom: 30px; font-size: 0.7rem; opacity: 0.3; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="video-viewport">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="bg-video.mp4" type="video/mp4">
        </video>
    </div>

    <div class="container">
        
        <div id="quote-container">
            <p id="quote">"I love you. I know."</p>
        </div>

        <footer>&copy; 2026 ELIRAM.CO - ALL RIGHTS RESERVED</footer>
    </div>

    <script>
        const quotes = [
            "I love you. I know.",
            "Do. Or do not. There is no try.",
            "The Force will be with you. Always.",
            "I find your lack of faith disturbing.",
            "Never tell me the odds!",
            "This is the way.",
            "Fear is the path to the dark side.",
            "Your focus determines your reality.",
            "In my experience, there is no such thing as luck.",
            "Chewie, we're home."
        ];
        
        function updateQuote() {
            const el = document.getElementById('quote');
            if (!el) return; // Safety check
        
            // FIX: Changed from el.style(...) to el.style.opacity = ...
            el.style.opacity = 0; 
            
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * quotes.length);
                el.innerText = `"${quotes[randomIndex]}"`;
                el.style.opacity = 1;
            }, 800);
        }
        
        // Change every 6 seconds
        setInterval(updateQuote, 6000);
        
        // Run once on load
        updateQuote();
    </script>
</body>
</html>
