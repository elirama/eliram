<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eliram.co | AI Logos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%;
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
            background-color: black;
        }

        /* Background Video Styling */
        #video-viewport {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        video {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: brightness(0.4); /* Makes text easier to read */
        }

        /* Overlay Content */
        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .logo {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 1.2rem;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        /* Star Wars Quote Section */
        #quote-container {
            max-width: 600px;
            min-height: 80px;
            margin-bottom: 40px;
        }

        #quote {
            font-style: italic;
            font-size: 1.5rem;
            line-height: 1.4;
            transition: opacity 0.5s ease-in-out;
        }

        .cta-button {
            padding: 15px 40px;
            font-size: 1rem;
            font-weight: 700;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid white;
            text-decoration: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cta-button:hover {
            background: white;
            color: black;
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div id="video-viewport">
        <video autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-stars-in-space-background-1610-large.mp4" type="video/mp4">
        </video>
    </div>

    <div class="container">
        <div class="logo">eliram.co</div>
        <div class="tagline">Create professional logos quickly with AI.</div>

        <div id="quote-container">
            <p id="quote">"The Force will be with you. Always."</p>
        </div>

        <a href="#" class="cta-button">Start Creating</a>

        <footer>Copyright © 2026 eliram.co - All Rights Reserved.</footer>
    </div>

    <script>
        const quotes = [
            "The Force will be with you. Always.",
            "Do. Or do not. There is no try.",
            "I find your lack of faith disturbing.",
            "Never tell me the odds!",
            "This is the way.",
            "I love you. I know.",
            "Fear is the path to the dark side.",
            "In my experience, there is no such thing as luck.",
            "Chewie, we're home.",
            "Your focus determines your reality."
        ];

        function getRandomQuote() {
            const quoteElement = document.getElementById('quote');
            const randomIndex = Math.floor(Math.random() * quotes.length);
            
            // Fade out, change, fade in
            quoteElement.style.opacity = 0;
            setTimeout(() => {
                quoteElement.innerText = `"${quotes[randomIndex]}"`;
                quoteElement.style.opacity = 1;
            }, 500);
        }

        // Change quote every 7 seconds
        setInterval(getRandomQuote, 7000);
        // Initial random quote
        getRandomQuote();
    </script>
</body>
</html>
